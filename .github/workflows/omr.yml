name: OMR

# Optical Music Recognition pipeline (issue #5).
# Pulls an uploaded PDF/image from R2, runs oemer (homr fallback), and writes the
# resulting MusicXML back to R2 where the browser polls for it.
#
# Gating / why this never breaks CI or main:
#   This workflow ONLY runs on `repository_dispatch` (fired by the Pages Function)
#   or manual `workflow_dispatch`. It has no `pull_request` or `push` trigger, so it
#   cannot run on a PR or on a push to main, and therefore cannot fail a required
#   check or turn main red before the R2_* secrets exist. Until those secrets are
#   set, a manual run simply fails at the download step; main stays green regardless.
on:
  repository_dispatch:
    types: [omr-job]
  workflow_dispatch:
    inputs:
      jobId:
        description: "Job id to process (R2 key uploads/<jobId>)"
        required: true
        type: string

# Coalesce duplicate dispatches for the same job; let an in-flight run finish.
concurrency:
  group: omr-${{ github.event.client_payload.jobId || inputs.jobId }}
  cancel-in-progress: false

# The job only reads R2 (via S3 creds in env) and never touches git; read-only is enough.
permissions:
  contents: read

jobs:
  recognize:
    name: Recognize sheet music to MusicXML
    runs-on: ubuntu-latest
    env:
      JOB_ID: ${{ github.event.client_payload.jobId || inputs.jobId }}
      # R2 S3-compatible credentials, supplied as Actions secrets (see runbook in
      # docs/context/infrastructure.md). AWS CLI ships on ubuntu-latest.
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      R2_S3_ENDPOINT: ${{ secrets.R2_S3_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
    steps:
      - uses: actions/checkout@v5

      - name: Validate jobId
        run: |
          set -euo pipefail
          if [ -z "${JOB_ID:-}" ]; then
            echo "::error::No jobId provided (client_payload.jobId or workflow_dispatch input)."
            exit 1
          fi
          # jobId is used directly in S3 keys and filenames; constrain it to a safe set.
          case "$JOB_ID" in
            *[!A-Za-z0-9_-]*)
              echo "::error::jobId '$JOB_ID' contains characters outside [A-Za-z0-9_-]."
              exit 1
              ;;
          esac
          echo "Processing jobId: $JOB_ID"

      - uses: actions/setup-python@v5
        with:
          # oemer supports 3.10/3.11; pin 3.10 for its onnx/torch wheels.
          python-version: "3.10"

      - name: Install system + Python dependencies
        run: |
          set -euo pipefail
          # poppler-utils gives us pdftoppm to rasterize the first page of a PDF.
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          python -m pip install --upgrade pip
          # oemer is the primary engine. Install it up front; homr is installed
          # lazily only if oemer fails, to keep the common path fast.
          pip install oemer

      - name: Download upload from R2
        run: |
          set -euo pipefail
          aws s3 cp \
            --endpoint-url "$R2_S3_ENDPOINT" \
            "s3://$R2_BUCKET/uploads/$JOB_ID" ./input.bin
          ls -la ./input.bin

      - name: Prepare image (rasterize PDFs)
        id: prep
        run: |
          set -euo pipefail
          # Sniff the file type. oemer wants a raster image; PDFs must be rendered.
          KIND=$(file --brief --mime-type ./input.bin || echo "application/octet-stream")
          echo "Detected MIME: $KIND"
          if [ "$KIND" = "application/pdf" ]; then
            # Render only the first page to PNG (sheet uploads are single-page scans).
            pdftoppm -png -r 300 -f 1 -l 1 ./input.bin ./page
            # pdftoppm appends -1, -01, or -001 depending on page count width.
            IMG=$(ls ./page-*.png | head -n1)
          elif [ "$KIND" = "image/png" ]; then
            cp ./input.bin ./page.png
            IMG=./page.png
          elif [ "$KIND" = "image/jpeg" ]; then
            cp ./input.bin ./page.jpg
            IMG=./page.jpg
          else
            # Best effort: hand the raw bytes to oemer as a .png and let it try.
            echo "::warning::Unrecognized MIME '$KIND'; attempting to treat as PNG."
            cp ./input.bin ./page.png
            IMG=./page.png
          fi
          echo "Using image: $IMG"
          echo "image=$IMG" >> "$GITHUB_OUTPUT"

      - name: Run oemer (primary)
        id: oemer
        continue-on-error: true
        run: |
          set -euo pipefail
          IMG='${{ steps.prep.outputs.image }}'
          # oemer writes <image-basename>.musicxml next to the input by default.
          oemer "$IMG" -o ./oemer-out
          # Find whatever MusicXML/XML it produced.
          OUT=$(ls ./oemer-out/*.musicxml ./oemer-out/*.xml 2>/dev/null | head -n1 || true)
          if [ -z "$OUT" ]; then
            # Some versions write next to the input image instead of -o dir.
            OUT=$(ls ./*.musicxml ./*.xml 2>/dev/null | head -n1 || true)
          fi
          if [ -z "$OUT" ]; then
            echo "::warning::oemer produced no MusicXML."
            exit 1
          fi
          cp "$OUT" ./result.musicxml
          echo "oemer wrote: $OUT"

      - name: Run homr (fallback)
        id: homr
        if: steps.oemer.outcome != 'success'
        continue-on-error: true
        run: |
          set -euo pipefail
          echo "oemer did not succeed; attempting homr fallback (best-effort)."
          pip install homr
          IMG='${{ steps.prep.outputs.image }}'
          # homr's CLI emits MusicXML; output path/name varies by version, so we
          # collect whatever XML it leaves behind.
          homr "$IMG" || true
          OUT=$(ls ./*.musicxml ./*.xml 2>/dev/null | head -n1 || true)
          if [ -z "$OUT" ]; then
            echo "::warning::homr produced no MusicXML."
            exit 1
          fi
          cp "$OUT" ./result.musicxml
          echo "homr wrote: $OUT"

      - name: Write error sentinel if both engines failed
        if: steps.oemer.outcome != 'success' && steps.homr.outcome != 'success'
        run: |
          set -euo pipefail
          # Both engines failed. Write a minimal, valid score-partwise document to the
          # result key so the browser stops polling instead of hanging forever. The
          # client can detect the empty/sentinel score and show a friendly error.
          echo "::warning::oemer and homr both failed; writing error sentinel MusicXML."
          cat > ./result.musicxml <<'XML'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE score-partwise PUBLIC "-//Recordare//DTD MusicXML 4.0 Partwise//EN" "http://www.musicxml.org/dtds/partwise.dtd">
          <score-partwise version="4.0">
            <work><work-title>OMR failed</work-title></work>
            <identification>
              <miscellaneous>
                <miscellaneous-field name="omr-status">failed</miscellaneous-field>
              </miscellaneous>
            </identification>
            <part-list>
              <score-part id="P1"><part-name>Music</part-name></score-part>
            </part-list>
            <part id="P1">
              <measure number="1">
                <attributes>
                  <divisions>1</divisions>
                  <key><fifths>0</fifths></key>
                  <time><beats>4</beats><beat-type>4</beat-type></time>
                  <clef><sign>G</sign><line>2</line></clef>
                </attributes>
                <note><rest/><duration>4</duration><type>whole</type></note>
              </measure>
            </part>
          </score-partwise>
          XML

      - name: Upload MusicXML result to R2
        run: |
          set -euo pipefail
          # Something always lands at results/<jobId>.musicxml (real score or sentinel)
          # so the browser poll terminates.
          aws s3 cp \
            --endpoint-url "$R2_S3_ENDPOINT" \
            --content-type "application/vnd.recordare.musicxml+xml" \
            ./result.musicxml \
            "s3://$R2_BUCKET/results/$JOB_ID.musicxml"
          echo "Uploaded results/$JOB_ID.musicxml"
