<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Piano Helper</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <h1>Piano Helper</h1>
        <div class="topbar-rows">
          <div class="controls">
            <div class="group group-source">
              <label class="file-btn">
                Load MusicXML
                <input id="file-input" type="file" accept=".xml,.musicxml" hidden />
              </label>
              <label class="file-btn">
                Scan sheet (PDF/image)
                <input
                  id="scan-input"
                  type="file"
                  accept="image/png,image/jpeg,application/pdf,.png,.jpg,.jpeg,.pdf"
                  hidden
                />
              </label>
              <label class="file-btn">
                From audio (MP3/WAV)
                <input
                  id="audio-input"
                  type="file"
                  accept="audio/mpeg,audio/wav,audio/x-wav,.mp3,.wav"
                  hidden
                />
              </label>
            </div>
            <div class="group group-output">
              <button id="export-btn" disabled>Export video</button>
            </div>
            <div class="group group-settings">
              <button id="names-btn" class="toggle">Names: Solfege</button>
              <div id="hand-mutes" class="hand-mutes" role="group" aria-label="Mute by hand" hidden>
                <button
                  id="mute-right-btn"
                  class="toggle hand-toggle"
                  type="button"
                  aria-pressed="false"
                  title="Mute the right hand (treble)"
                >
                  <span class="hand-swatch hand-swatch-right" aria-hidden="true"></span>
                  <span class="hand-toggle-label">Right hand</span>
                </button>
                <button
                  id="mute-left-btn"
                  class="toggle hand-toggle"
                  type="button"
                  aria-pressed="false"
                  title="Mute the left hand (bass)"
                >
                  <span class="hand-swatch hand-swatch-left" aria-hidden="true"></span>
                  <span class="hand-toggle-label">Left hand</span>
                </button>
              </div>
              <div class="tempo">
                <span class="tempo-label">Tempo</span>
                <input
                  id="tempo-slider"
                  type="range"
                  min="25"
                  max="200"
                  value="100"
                  step="5"
                  aria-label="Playback tempo, percent of score speed"
                />
                <button id="tempo-readout" class="tempo-readout" title="Reset to 100%">100%</button>
              </div>
            </div>
            <span id="track-name" class="track-name">No file loaded</span>
            <span id="sound-status" class="sound-status"></span>
          </div>
          <div class="transport">
            <div class="transport-cluster">
              <button
                id="prev-note-btn"
                class="step-btn"
                title="Previous note (Left arrow)"
                aria-label="Previous note"
                disabled
              >
                <svg
                  class="step-icon"
                  viewBox="0 0 24 24"
                  width="20"
                  height="20"
                  fill="currentColor"
                  aria-hidden="true"
                  focusable="false"
                >
                  <rect x="5" y="5" width="2.4" height="14" rx="1" />
                  <path d="M19 5.5v13a.8.8 0 0 1-1.23.67l-9.5-6.5a.8.8 0 0 1 0-1.34l9.5-6.5A.8.8 0 0 1 19 5.5z" />
                </svg>
              </button>
              <button id="play-btn" title="Play / pause (Space)" disabled>Play</button>
              <button
                id="next-note-btn"
                class="step-btn"
                title="Next note (Right arrow)"
                aria-label="Next note"
                disabled
              >
                <svg
                  class="step-icon"
                  viewBox="0 0 24 24"
                  width="20"
                  height="20"
                  fill="currentColor"
                  aria-hidden="true"
                  focusable="false"
                >
                  <path d="M5 5.5v13a.8.8 0 0 0 1.23.67l9.5-6.5a.8.8 0 0 0 0-1.34l-9.5-6.5A.8.8 0 0 0 5 5.5z" />
                  <rect x="16.6" y="5" width="2.4" height="14" rx="1" />
                </svg>
              </button>
            </div>
            <input
              id="seek-slider"
              type="range"
              min="0"
              max="1000"
              value="0"
              step="1"
              aria-label="Playback position"
              aria-valuetext="0:00 / 0:00"
              disabled
            />
            <span id="time-readout" class="time-readout" aria-hidden="true">0:00 / 0:00</span>
          </div>
        </div>
      </header>
      <div id="sheet"></div>
      <canvas id="stage"></canvas>
      <div id="rotate-hint" role="status">Rotate to landscape for a wider keyboard</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
