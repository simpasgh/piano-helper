<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Piano Helper</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <h1>Piano Helper</h1>
        <div class="topbar-rows">
          <div class="controls">
            <div class="group group-source">
              <label class="file-btn">
                <svg
                  class="btn-icon"
                  viewBox="0 0 24 24"
                  width="18"
                  height="18"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                  focusable="false"
                >
                  <path d="M19.5 14.25V11.625C19.5 9.76104 17.989 8.25 16.125 8.25H14.625C14.0037 8.25 13.5 7.74632 13.5 7.125V5.625C13.5 3.76104 11.989 2.25 10.125 2.25H8.25M15 14.25L12 11.25M12 11.25L9 14.25M12 11.25L12 17.25M10.5 2.25H5.625C5.00368 2.25 4.5 2.75368 4.5 3.375V20.625C4.5 21.2463 5.00368 21.75 5.625 21.75H18.375C18.9963 21.75 19.5 21.2463 19.5 20.625V11.25C19.5 6.27944 15.4706 2.25 10.5 2.25Z" />
                </svg>
                <span class="btn-label">Load MusicXML</span>
                <input
                  id="file-input"
                  type="file"
                  accept=".xml,.musicxml"
                  class="visually-hidden"
                />
              </label>
              <label class="file-btn">
                <svg
                  class="btn-icon"
                  viewBox="0 0 24 24"
                  width="18"
                  height="18"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                  focusable="false"
                >
                  <path d="M6.82689 6.1749C6.46581 6.75354 5.86127 7.13398 5.186 7.22994C4.80655 7.28386 4.42853 7.34223 4.05199 7.40497C2.99912 7.58042 2.25 8.50663 2.25 9.57402V18C2.25 19.2426 3.25736 20.25 4.5 20.25H19.5C20.7426 20.25 21.75 19.2426 21.75 18V9.57403C21.75 8.50664 21.0009 7.58043 19.948 7.40498C19.5715 7.34223 19.1934 7.28387 18.814 7.22995C18.1387 7.13398 17.5342 6.75354 17.1731 6.17491L16.3519 4.85889C15.9734 4.25237 15.3294 3.85838 14.6155 3.82005C13.7496 3.77355 12.8775 3.75 12 3.75C11.1225 3.75 10.2504 3.77355 9.3845 3.82005C8.6706 3.85838 8.02658 4.25237 7.64809 4.85889L6.82689 6.1749Z" />
                  <path d="M16.5 12.75C16.5 15.2353 14.4853 17.25 12 17.25C9.51472 17.25 7.5 15.2353 7.5 12.75C7.5 10.2647 9.51472 8.25 12 8.25C14.4853 8.25 16.5 10.2647 16.5 12.75Z" />
                  <path d="M18.75 10.5H18.7575V10.5075H18.75V10.5Z" />
                </svg>
                <span class="btn-label">Scan sheet (PDF/image)</span>
                <input
                  id="scan-input"
                  type="file"
                  accept="image/png,image/jpeg,application/pdf,.png,.jpg,.jpeg,.pdf"
                  class="visually-hidden"
                />
              </label>
              <label class="file-btn">
                <svg
                  class="btn-icon"
                  viewBox="0 0 24 24"
                  width="18"
                  height="18"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                  focusable="false"
                >
                  <path d="M9 9L19.5 6M19.5 12.5528V16.3028C19.5 17.3074 18.834 18.1903 17.8681 18.4663L16.5481 18.8434C15.3964 19.1724 14.25 18.3077 14.25 17.1099C14.25 16.305 14.7836 15.5975 15.5576 15.3764L17.8681 14.7163C18.834 14.4403 19.5 13.5574 19.5 12.5528ZM19.5 12.5528V2.25L9 5.25V15.5528M9 15.5528V19.3028C9 20.3074 8.33405 21.1903 7.36812 21.4663L6.04814 21.8434C4.89645 22.1724 3.75 21.3077 3.75 20.1099C3.75 19.305 4.2836 18.5975 5.05757 18.3764L7.36812 17.7163C8.33405 17.4403 9 16.5574 9 15.5528Z" />
                </svg>
                <span class="btn-label">From audio (MP3/WAV)</span>
                <input
                  id="audio-input"
                  type="file"
                  accept="audio/mpeg,audio/wav,audio/x-wav,.mp3,.wav"
                  class="visually-hidden"
                />
              </label>
            </div>
            <div class="group group-output">
              <button id="export-btn" disabled>
                <svg
                  class="btn-icon"
                  viewBox="0 0 24 24"
                  width="18"
                  height="18"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                  focusable="false"
                >
                  <path d="M3 16.5V18.75C3 19.9926 4.00736 21 5.25 21H18.75C19.9926 21 21 19.9926 21 18.75V16.5M16.5 12L12 16.5M12 16.5L7.5 12M12 16.5V3" />
                </svg>
                <span class="btn-label">Export video</span>
              </button>
            </div>
            <div class="group group-settings">
              <button id="names-btn" class="toggle">
                <svg
                  class="btn-icon"
                  viewBox="0 0 24 24"
                  width="16"
                  height="16"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                  focusable="false"
                >
                  <path d="M2.03555 12.3224C1.96647 12.1151 1.9664 11.8907 2.03536 11.6834C3.42372 7.50972 7.36079 4.5 12.0008 4.5C16.6387 4.5 20.5742 7.50692 21.9643 11.6776C22.0334 11.8849 22.0335 12.1093 21.9645 12.3166C20.5761 16.4903 16.6391 19.5 11.9991 19.5C7.36119 19.5 3.42564 16.4931 2.03555 12.3224Z" />
                  <path d="M15 12C15 13.6569 13.6569 15 12 15C10.3431 15 9 13.6569 9 12C9 10.3431 10.3431 9 12 9C13.6569 9 15 10.3431 15 12Z" />
                </svg>
                <span class="btn-label" id="names-label">Names: Solfege</span>
              </button>
              <button
                id="edit-btn"
                class="toggle"
                type="button"
                aria-pressed="false"
                title="Edit mode off. Click to fix wrong notes on the staff or the falling notes."
                disabled
              >
                <svg
                  class="btn-icon"
                  viewBox="0 0 24 24"
                  width="16"
                  height="16"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                  focusable="false"
                >
                  <path d="M16.862 4.487l1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
                </svg>
                <span class="btn-label">Edit</span>
              </button>
              <div id="hand-mutes" class="hand-mutes" role="group" aria-label="Mute by hand" hidden>
                <button
                  id="mute-right-btn"
                  class="toggle hand-toggle"
                  type="button"
                  aria-pressed="false"
                  title="Right hand: audible. Click to mute."
                >
                  <span class="hand-spk" aria-hidden="true">
                    <svg class="hand-spk-svg" viewBox="0 0 16 16" width="15" height="15">
                      <path d="M3 6 H5 L8.5 3 V13 L5 10 H3 Z" />
                      <path class="spk-waves" d="M10.5 5.5 a3.2 3.2 0 0 1 0 5 M12 4 a5 5 0 0 1 0 8" />
                      <path class="spk-slash" d="M10.5 5 L14 11" />
                    </svg>
                  </span>
                  <span class="hand-toggle-label">Right hand</span>
                </button>
                <button
                  id="mute-left-btn"
                  class="toggle hand-toggle"
                  type="button"
                  aria-pressed="false"
                  title="Left hand: audible. Click to mute."
                >
                  <span class="hand-spk" aria-hidden="true">
                    <svg class="hand-spk-svg" viewBox="0 0 16 16" width="15" height="15">
                      <path d="M3 6 H5 L8.5 3 V13 L5 10 H3 Z" />
                      <path class="spk-waves" d="M10.5 5.5 a3.2 3.2 0 0 1 0 5 M12 4 a5 5 0 0 1 0 8" />
                      <path class="spk-slash" d="M10.5 5 L14 11" />
                    </svg>
                  </span>
                  <span class="hand-toggle-label">Left hand</span>
                </button>
                <div class="hand-balance">
                  <span class="hand-balance-label">Balance</span>
                  <input
                    id="balance-slider"
                    type="range"
                    min="-100"
                    max="100"
                    value="0"
                    step="5"
                    aria-label="Hand volume balance: negative favors left hand, positive favors right hand"
                  />
                  <button id="balance-readout" class="balance-readout" type="button" title="Reset to even">L100 R100</button>
                </div>
              </div>
              <div class="tempo">
                <span class="tempo-label">Tempo</span>
                <input
                  id="tempo-slider"
                  type="range"
                  min="25"
                  max="200"
                  value="100"
                  step="5"
                  aria-label="Playback tempo, percent of score speed"
                />
                <button id="tempo-readout" class="tempo-readout" title="Reset to 100%">100%</button>
              </div>
            </div>
            <div id="track-name" class="track-name">
              <button
                id="sheet-name"
                class="sheet-name"
                type="button"
                title="Click to rename the sheet"
                aria-label="Sheet name, click to rename"
                hidden
              ></button>
              <input
                id="sheet-name-input"
                class="sheet-name-input"
                type="text"
                maxlength="80"
                aria-label="Edit sheet name"
                hidden
              />
              <span id="sheet-note-count" class="sheet-note-count"></span>
              <span id="track-status" class="track-status">No file loaded</span>
            </div>
            <span id="sound-status" class="sound-status"></span>
          </div>
          <div class="transport">
            <div class="transport-cluster">
              <button
                id="prev-note-btn"
                class="step-btn"
                title="Previous note (Left arrow)"
                aria-label="Previous note"
                disabled
              >
                <svg
                  class="step-icon"
                  viewBox="0 0 24 24"
                  width="20"
                  height="20"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                  focusable="false"
                >
                  <path d="M21 16.8115C21 17.6753 20.0668 18.2169 19.3169 17.7883L12.2094 13.7269C11.4536 13.295 11.4536 12.2052 12.2094 11.7733L19.3169 7.7119C20.0668 7.28334 21 7.82487 21 8.68867V16.8115Z" />
                  <path d="M11.25 16.8115C11.25 17.6753 10.3168 18.2169 9.56685 17.7883L2.45936 13.7269C1.70357 13.295 1.70357 12.2052 2.45936 11.7733L9.56685 7.7119C10.3168 7.28334 11.25 7.82487 11.25 8.68867L11.25 16.8115Z" />
                </svg>
              </button>
              <button id="play-btn" title="Play / pause (Space)" aria-label="Play" disabled>
                <svg
                  class="btn-icon play-icon"
                  viewBox="0 0 24 24"
                  width="18"
                  height="18"
                  fill="currentColor"
                  aria-hidden="true"
                  focusable="false"
                >
                  <path d="M4.5 5.65257C4.5 4.22644 6.029 3.32239 7.2786 4.00967L18.8192 10.357C20.1144 11.0694 20.1144 12.9304 18.8192 13.6428L7.2786 19.9901C6.029 20.6774 4.5 19.7733 4.5 18.3472V5.65257Z" />
                </svg>
                <span class="btn-label" id="play-label">Play</span>
              </button>
              <button
                id="next-note-btn"
                class="step-btn"
                title="Next note (Right arrow)"
                aria-label="Next note"
                disabled
              >
                <svg
                  class="step-icon"
                  viewBox="0 0 24 24"
                  width="20"
                  height="20"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                  focusable="false"
                >
                  <path d="M3 8.68867C3 7.82487 3.93317 7.28334 4.68316 7.7119L11.7906 11.7733C12.5464 12.2052 12.5464 13.295 11.7906 13.7269L4.68316 17.7883C3.93317 18.2169 3 17.6753 3 16.8115V8.68867Z" />
                  <path d="M12.75 8.68867C12.75 7.82487 13.6832 7.28334 14.4332 7.7119L21.5406 11.7733C22.2964 12.2052 22.2964 13.295 21.5406 13.7269L14.4332 17.7883C13.6832 18.2169 12.75 17.6753 12.75 16.8115V8.68867Z" />
                </svg>
              </button>
            </div>
            <input
              id="seek-slider"
              type="range"
              min="0"
              max="1000"
              value="0"
              step="1"
              aria-label="Playback position"
              aria-valuetext="0:00 / 0:00"
              disabled
            />
            <span id="time-readout" class="time-readout" aria-hidden="true">0:00 / 0:00</span>
          </div>
        </div>
      </header>
      <!-- #sheet-pane wraps #sheet and the docked #edit-toolbar so the toolbar lives OUTSIDE the
           OSMD-owned #sheet. OSMD's load/render clears #sheet's children (it detaches anything
           inside, which is why #verovio-host is re-appended on each render), so a static toolbar
           nested in #sheet would be silently removed on a large score's autoResize re-render and
           never reappear when un-hidden. Keeping it as a flex sibling of #sheet makes show/hide a
           reliable [hidden] toggle on a node OSMD can never touch. -->
      <div id="sheet-pane">
        <!-- Docked edit toolbar (Smart Edit Mode): shown only in edit mode, anchored to the
             top of the sheet pane (the staff scrolls beneath it). Undo/redo sit at the LEADING edge
             (a fixed history spot); the per-selection cluster (readout + pitch down/up + delete)
             shows when a note is selected on EITHER surface and acts on the one shared selection.
             Delete is model-level, dual-surface, undoable, and fixed-bar (the note becomes a rest;
             the measure still adds up). -->
        <div id="edit-toolbar" class="edit-toolbar" role="toolbar" aria-label="Edit tools" hidden>
          <div class="edit-tool-group">
            <button id="undo-btn" class="edit-tool-btn" type="button" title="Undo (Ctrl+Z)" aria-label="Undo" disabled aria-disabled="true">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <path d="M9 14L4 9m0 0l5-5M4 9h11a5 5 0 0 1 0 10h-3" />
              </svg>
            </button>
            <button id="redo-btn" class="edit-tool-btn" type="button" title="Redo (Ctrl+Shift+Z)" aria-label="Redo" disabled aria-disabled="true">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <path d="M15 14l5-5m0 0l-5-5m5 5H9a5 5 0 0 0 0 10h3" />
              </svg>
            </button>
          </div>
          <div
            id="note-edit"
            class="note-edit"
            role="group"
            aria-label="Edit selected note"
            hidden
          >
            <span id="note-edit-readout" class="note-edit-readout"></span>
            <button id="pitch-down-btn" class="edit-tool-btn" type="button" title="Pitch down (Down arrow on the staff, minus on the falling notes)" aria-label="Pitch down">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <path d="M19 9l-7 7-7-7" />
              </svg>
            </button>
            <button id="pitch-up-btn" class="edit-tool-btn" type="button" title="Pitch up (Up arrow on the staff, plus on the falling notes)" aria-label="Pitch up">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <path d="M5 15l7-7 7 7" />
              </svg>
            </button>
            <button id="dur-shorter-btn" class="edit-tool-btn" type="button" title="Make this note shorter (comma). Halves the value: half to quarter to eighth." aria-label="Shorter note">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <path d="M9 12h6" />
              </svg>
            </button>
            <button id="dur-longer-btn" class="edit-tool-btn" type="button" title="Make this note longer (period). Doubles the value: eighth to quarter to half." aria-label="Longer note">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <path d="M3 12h18" />
              </svg>
            </button>
            <!-- DOTTED v1: a TOGGLE. aria-pressed reflects whether the selected note is dotted (main.ts
                 keeps it in sync). The glyph is a notehead + a single augmentation dot. -->
            <button id="dur-dot-btn" class="edit-tool-btn" type="button" aria-pressed="false" title="Dot this note (semicolon). Adds half its value again: quarter to dotted quarter." aria-label="Dotted note">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" stroke="none" aria-hidden="true" focusable="false">
                <ellipse cx="10" cy="14" rx="5" ry="3.6" transform="rotate(-20 10 14)" />
                <circle cx="19" cy="14" r="1.8" />
              </svg>
            </button>
            <button id="delete-note-btn" class="edit-tool-btn" type="button" title="Delete this note (Delete or Backspace). It becomes a rest; the bar still adds up." aria-label="Delete this note">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <path d="M4 7h16M10 11v6M14 11v6M5 7l1 13a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1l1-13M9 7V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v3" />
              </svg>
            </button>
          </div>
          <!-- ADD-a-note v1 cluster: shown when a REST is selected (swaps with #note-edit). One
               primary "Add a note" button fills the rest with a note of the same duration. -->
          <div
            id="add-note"
            class="note-edit"
            role="group"
            aria-label="Add a note on the selected rest"
            hidden
          >
            <span id="add-note-readout" class="note-edit-readout"></span>
            <button id="add-note-btn" class="edit-tool-btn edit-tool-btn-primary" type="button" title="Add a note here (Enter or N). The rest becomes a note of the same duration." aria-label="Add a note">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <circle cx="12" cy="12" r="8.5" />
                <path d="M12 8.5v7M8.5 12h7" />
              </svg>
            </button>
          </div>
        </div>
        <div id="sheet"></div>
      </div>
      <!-- Verovio attribution (LGPL-3.0 obligation): shown only while the Verovio edit view
           is active. Hidden by default so the normal OSMD player is unchanged. -->
      <a
        id="verovio-credit"
        class="verovio-credit"
        href="https://www.verovio.org"
        target="_blank"
        rel="noopener noreferrer"
        hidden
        >Rendered by Verovio</a
      >
      <canvas id="stage"></canvas>
      <!-- ONE shared polite live region for all edit/selection/undo announcements (Smart Edit P1
           collapses P0's two regions into one to avoid a double-announce when one model change
           updates both surfaces). -->
      <span id="edit-live" class="visually-hidden" aria-live="polite"></span>
      <div
        id="scan-overlay"
        class="scan-overlay"
        role="dialog"
        aria-modal="true"
        aria-labelledby="scan-overlay-title"
        aria-describedby="scan-overlay-body"
        aria-busy="true"
        hidden
      >
        <div class="scan-overlay-card">
          <div class="scan-spinner" aria-hidden="true"></div>
          <h2 id="scan-overlay-title" class="scan-overlay-title">Scanning your sheet</h2>
          <p id="scan-overlay-body" class="scan-overlay-body">
            This usually takes about a minute.
            <span class="scan-overlay-body-extra"> Hang tight while we read the notes.</span>
          </p>
          <button id="scan-overlay-cancel" class="scan-overlay-cancel" type="button">
            Cancel
          </button>
          <p class="scan-overlay-note">
            The scan keeps running on our side, this just stops waiting.
          </p>
        </div>
      </div>
      <div id="rotate-hint" role="status">Rotate to landscape for a wider keyboard</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
