<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Piano Helper</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <h1>Piano Helper</h1>
        <div class="controls">
          <label class="file-btn">
            Load MusicXML
            <input id="file-input" type="file" accept=".xml,.musicxml" hidden />
          </label>
          <label class="file-btn">
            Scan sheet (PDF/image)
            <input
              id="scan-input"
              type="file"
              accept="image/png,image/jpeg,application/pdf,.png,.jpg,.jpeg,.pdf"
              hidden
            />
          </label>
          <button id="play-btn" disabled>Play</button>
          <button id="names-btn" class="toggle">Names: Solfege</button>
          <span id="track-name" class="track-name">No file loaded</span>
          <span id="sound-status" class="sound-status"></span>
        </div>
      </header>
      <div id="sheet"></div>
      <canvas id="stage"></canvas>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
