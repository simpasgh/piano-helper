#cloud-config
# Piano Helper OMR worker first-boot setup for a Hetzner Cloud VM (Ubuntu 22.04).
# The box that actually landed is x86 cx33 (ARM cax21 was out of capacity across all
# EU locations at provision time). This script is arch-agnostic, so it works on either.
#
# Differences from oracle-cloud-init.yaml: Hetzner's Ubuntu image logs in as root
# and has NO 'ubuntu' user, but the worker systemd unit runs as User=ubuntu. So we
# create the ubuntu user (sudo + the same SSH key) before running the bootstrap.
#
# Passed to `hcloud server create --user-data-from-file`. On first boot it:
#   1. creates the ubuntu user with the admin SSH key,
#   2. installs poppler-utils (pdftoppm) + python venv tooling + git,
#   3. clones the repo to /opt/piano-helper,
#   4. builds the venv and installs requirements (two-step, oemer --no-deps),
#   5. installs + enables the systemd unit omr-worker.service.
#
# It does NOT write the R2 credentials. Those are a secret, so after the VM lands you
# SSH in once and create /etc/piano-helper-omr.env, then `systemctl restart omr-worker`.

users:
  - default
  - name: ubuntu
    groups: [sudo]
    shell: /bin/bash
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIRj3+7wUbgSvjJPKkuVRagY/3O75haa2nyJUX0ydclW piano-helper-omr

write_files:
  - path: /opt/omr-bootstrap.sh
    permissions: "0755"
    owner: root:root
    content: |
      #!/usr/bin/env bash
      # Idempotent provisioning for the OMR worker. Safe to re-run.
      set -euo pipefail

      OMR_REPO_URL="${OMR_REPO_URL:-https://github.com/simpasgh/piano-helper.git}"
      OMR_REPO_REF="${OMR_REPO_REF:-main}"
      REPO_DIR=/opt/piano-helper
      WORKER_DIR="$REPO_DIR/omr-worker"
      VENV="$WORKER_DIR/.venv"
      RUN_USER=ubuntu

      log() { echo "[omr-bootstrap] $*"; }

      log "Installing system packages (poppler-utils, python venv, git, file)."
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -y
      # poppler-utils: pdftoppm (oemer raster path). libgl1 + libglib2.0-0: required by
      # opencv (pulled by Clarity-OMR's ultralytics) on a headless server, without them
      # `import cv2` dies with "libGL.so.1: cannot open shared object file" and Clarity
      # silently falls back to oemer.
      apt-get install -y poppler-utils python3 python3-venv python3-pip file git libgl1 libglib2.0-0

      log "Fetching the repo ($OMR_REPO_URL @ $OMR_REPO_REF) into $REPO_DIR."
      if [ -d "$REPO_DIR/.git" ]; then
        git -C "$REPO_DIR" fetch --depth 1 origin "$OMR_REPO_REF"
        git -C "$REPO_DIR" checkout -f FETCH_HEAD
      else
        rm -rf "$REPO_DIR"
        git clone --depth 1 --branch "$OMR_REPO_REF" "$OMR_REPO_URL" "$REPO_DIR"
      fi
      chown -R "$RUN_USER":"$RUN_USER" "$REPO_DIR"

      log "Building the Python venv and installing requirements (slow: large ML stack)."
      sudo -u "$RUN_USER" python3 -m venv "$VENV"
      sudo -u "$RUN_USER" "$VENV/bin/pip" install --upgrade pip
      sudo -u "$RUN_USER" "$VENV/bin/pip" install -r "$WORKER_DIR/requirements.txt"
      # oemer separately, WITHOUT deps: it pins onnxruntime-gpu (a CUDA build we don't want on
      # this CPU-only box). The CPU onnxruntime from requirements.txt provides the same module.
      sudo -u "$RUN_USER" "$VENV/bin/pip" install --no-deps -r "$WORKER_DIR/requirements-oemer.txt"

      # Clarity-OMR (github.com/clquwu/Clarity-OMR, GPL-3.0) is the PRIMARY engine;
      # oemer is the fallback. It is a standalone Python repo with its own venv. CPU torch
      # is installed explicitly from the CPU index so we don't pull the ~2GB CUDA wheel on
      # this GPU-less box. Models (yolo.pt + model.safetensors) auto-download from
      # HuggingFace on first run.
      CLARITY_DIR=/opt/clarity-omr
      log "Installing Clarity-OMR (primary engine) into $CLARITY_DIR."
      if [ ! -d "$CLARITY_DIR/.git" ]; then
        git clone --depth 1 https://github.com/clquwu/Clarity-OMR.git "$CLARITY_DIR"
      fi
      chown -R "$RUN_USER":"$RUN_USER" "$CLARITY_DIR"
      sudo -u "$RUN_USER" python3 -m venv "$CLARITY_DIR/.venv"
      sudo -u "$RUN_USER" "$CLARITY_DIR/.venv/bin/pip" install --upgrade pip
      sudo -u "$RUN_USER" "$CLARITY_DIR/.venv/bin/pip" install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      sudo -u "$RUN_USER" "$CLARITY_DIR/.venv/bin/pip" install -r "$CLARITY_DIR/requirements.txt"

      log "Installing the systemd unit."
      cp "$WORKER_DIR/omr-worker.service" /etc/systemd/system/omr-worker.service
      systemctl daemon-reload
      systemctl enable omr-worker.service

      # Wire Clarity-OMR as the PRIMARY engine (these are paths, NOT secrets) UNCONDITIONALLY so
      # a clean rebuild always has them. The R2 creds are added manually AFTER first boot, so the
      # env file may not exist yet here: create it (0600) and add the Clarity vars now. Without
      # these two vars, worker.py's run_clarity returns None and SILENTLY falls back to oemer (a
      # quality regression, no error surfaced), so they must NOT depend on the creds step.
      ENV_FILE=/etc/piano-helper-omr.env
      touch "$ENV_FILE"; chmod 600 "$ENV_FILE"
      if ! grep -q '^CLARITY_OMR_DIR=' "$ENV_FILE"; then
        printf 'CLARITY_OMR_DIR=%s\nCLARITY_PYTHON=%s/.venv/bin/python\n' "$CLARITY_DIR" "$CLARITY_DIR" >> "$ENV_FILE"
      fi

      # Start the worker only once the R2 creds are present (grep a required key, NOT mere file
      # existence, since we just created the file above for the Clarity vars).
      if grep -q '^R2_S3_ENDPOINT=' "$ENV_FILE"; then
        log "R2 creds present; starting omr-worker."
        systemctl restart omr-worker.service || true
      else
        log "No R2 creds in $ENV_FILE yet. The unit is ENABLED but not started."
        log "SSH in, add the 4 R2_* creds to $ENV_FILE (keep chmod 600; CLARITY_* already there),"
        log "then: sudo systemctl restart omr-worker"
      fi

      log "Bootstrap complete."

runcmd:
  - [ bash, -lc, "/opt/omr-bootstrap.sh 2>&1 | tee -a /var/log/omr-bootstrap.log" ]
